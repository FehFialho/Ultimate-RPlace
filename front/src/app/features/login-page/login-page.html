<section class="login-container">

  <main>

    <!-- TELA DE LOGIN -->
    <div *ngIf="!isRegister">
      <h2>Login</h2>
      <form action="get" [formGroup]="loginForm" (ngSubmit)="login()">

        <label for="">Username</label>
        <input type="text" formControlName="username">

        <label for="">Password</label>
        <input type="text" formControlName="password">

        <button type="submit">Entrar</button>

      </form>
    </div>

    <!-- TELA DE REGISTRO -->
    <div *ngIf="isRegister">
      <h2>Criar Conta</h2>

      <form action="get" [formGroup]="loginForm" (ngSubmit)="subscribe()">

        <label for="">Username</label>
        <br>
        <input type="text" formControlName="username">

        <label for="">Password</label>
        <br>
        <input type="text" formControlName="password">

        <button type="submit">Entrar</button>

      </form>

    </div>

  </main>
</section>
